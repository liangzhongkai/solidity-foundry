name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "slither-analyzer>=0.10.0,<0.11.0"

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes --build-info

      - name: Run Forge tests
        run: |
          set -o pipefail
          forge test -vvv --ffi --gas-report | tee gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
          if-no-files-found: error

      - name: Slither (静态分析)
        run: slither . --config-file slither.config.json --fail-high

      - name: Echidna (模糊测试)
        uses: crytic/echidna-action@v2
        with:
          files: .
          contract: CounterEchidna
          config: echidna.yaml
          crytic-args: --ignore-compile
          test-limit: 5000
          solc-version: "0.8.20"

  manticore:
    name: Manticore (符号执行)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Manticore verifier
        run: |
          python -m venv .manticore-venv
          . .manticore-venv/bin/activate
          python -m pip install --upgrade pip
          pip install "protobuf>=3.19.0,<4"  # Manticore _pb2.py incompatible with protobuf 4.21+
          pip install "manticore==0.3.7"
          manticore-verifier src/manticore/CounterManticore.sol \
            --contract_name CounterManticore \
            --timeout 300
